<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KICKOFF P2P</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #000;
        color: #fff;
        font-family: ui-monospace, monospace;
        padding: 2rem;
      }
      h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
      .accent { color: #c6ff3d; }
      #log {
        margin-top: 1.5rem;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 1rem;
        max-height: 50vh;
        overflow-y: auto;
        font-size: 12px;
        line-height: 1.6;
      }
      .peer { color: #c6ff3d; }
    </style>
  </head>
  <body>
    <h1>KICKOFF <span class="accent">P2P</span></h1>
    <p id="status">Joining Hyperswarm room…</p>
    <p id="meta"></p>
    <div id="log"></div>
    <script type="module" src="./ui.js"></script>
  </body>
</html>
